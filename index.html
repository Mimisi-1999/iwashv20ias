<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>I Wash V20 - IAS</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Kanit',sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* BG */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top right, rgba(0,140,255,.18), transparent 30%),
    radial-gradient(circle at bottom left, rgba(0,255,170,.12), transparent 30%);
    z-index:-10;
}

/* HERO */

.hero{
    position:relative;
    min-height:100vh;
    overflow:hidden;
}

.hero video{
    position:absolute;
    top:50%;
    left:50%;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:translate(-50%,-50%);
    z-index:-2;
}

.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.75),
        rgba(0,0,0,.45),
        rgba(0,0,0,.9)
    );
    z-index:-1;
}

.hero-content{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

/* LOGO */

.logo{
    width:260px;
    max-width:80%;
    margin-bottom:25px;

    filter:
    drop-shadow(0 0 25px rgba(0,255,255,.35))
    drop-shadow(0 0 50px rgba(0,140,255,.25));

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* TEXT */

.hero h1{
    font-size:3.5rem;
    font-weight:800;
    margin-bottom:15px;

    background:linear-gradient(to right,#fff,#79d9ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    max-width:700px;
    line-height:1.8;
    color:#ddd;
    font-size:1.05rem;
    margin-bottom:40px;
}

/* BUTTON */

.btn-group{
    width:100%;
    max-width:1000px;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:18px;
}

.btn{
    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    padding:18px;

    border-radius:22px;

    text-decoration:none;
    color:#fff;

    font-weight:600;

    overflow:hidden;

    transition:.35s;

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    box-shadow:
    0 10px 30px rgba(0,0,0,.35);
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
}

.btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.2),
        transparent
    );
    transition:.7s;
}

.btn:hover::before{
    left:120%;
}

.btn-primary{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.btn-line{
    background:linear-gradient(135deg,#06C755,#00ff99);
}

.btn-map{
    background:linear-gradient(135deg,#2b2b2b,#454545);
}

.btn-call{
    background:linear-gradient(135deg,#ff512f,#dd2476);
}

/* PROMOTION */

.promotion{
    padding:100px 20px;
    text-align:center;
    background:#050505;
}

.promotion h2{
    font-size:2.8rem;
    margin-bottom:15px;

    background:linear-gradient(to right,#fff,#79d9ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.promotion p{
    color:#999;
    margin-bottom:40px;
}

/* SLIDER */

.slider{
    max-width:1200px;
    margin:auto;
    overflow:hidden;
    border-radius:30px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 0 40px rgba(0,153,255,.12),
    0 30px 60px rgba(0,0,0,.45);
}

.slides{
    display:flex;
    transition:.5s ease;
}

.slides img{
    width:100%;
    flex-shrink:0;
    object-fit:cover;
}

/* SLIDE BUTTON */

.slider-buttons{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:30px;
}

.slide-btn{
    width:58px;
    height:58px;
    border:none;
    border-radius:50%;
    cursor:pointer;

    color:#fff;

    background:
    linear-gradient(135deg,#00c6ff,#0072ff);

    transition:.3s;
}

.slide-btn:hover{
    transform:scale(1.08);
}

/* FOOTER */

footer{
    padding:30px 20px;
    text-align:center;
    color:#777;
    border-top:1px solid rgba(255,255,255,.05);
}

/* MOBILE */

@media(max-width:768px){

    .hero h1{
        font-size:2rem;
    }

    .hero p{
        font-size:.95rem;
    }

    .btn-group{
        grid-template-columns:1fr;
    }

    .promotion h2{
        font-size:2rem;
    }

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">

    <video autoplay muted loop playsinline>
        <source src="Video/IWashV20.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-content">

        <!-- LOGO -->
        <img src="image/logo.png" alt="I Wash V20 Logo" class="logo">

        <h1>I Wash V20 - IAS</h1>

        <p>
            ศูนย์ซ่อมรถครบวงจรและคาร์แคร์ระดับพรีเมียม<br>
            ดูแลทุกดีเทลของรถคุณ ให้กลับมาหล่อเหมือนวันแรก
        </p>

        <div class="btn-group">

            <a href="#promotion" class="btn btn-primary">
                <i class="fa-solid fa-fire"></i>
                ดูโปรโมชั่นล่าสุด
            </a>

            <a href="https://line.me/R/ti/p/@ksp6628c" target="_blank" class="btn btn-line">
                <i class="fa-brands fa-line"></i>
                เพิ่มเพื่อนบน LINE
            </a>

            <a href="https://maps.app.goo.gl/gvh8F1iNczJQDhYN8" target="_blank" class="btn btn-map">
                <i class="fa-solid fa-location-dot"></i>
                เปิดแผนที่ร้าน
            </a>

            <a href="tel:0899387244" class="btn btn-call">
                <i class="fa-solid fa-phone"></i>
                โทรหาเรา
            </a>

        </div>

    </div>

</section>

<!-- PROMOTION -->

<section class="promotion" id="promotion">

    <h2>โปรโมชั่นล่าสุด</h2>

    <p>
        โปรแรงสำหรับคนรักรถ ดูแลครบ จบในที่เดียว
    </p>

    <div class="slider">

        <div class="slides" id="slides">

            <img src="image/promo1.jpg" alt="">
            <img src="image/promo2.png" alt="">

        </div>

    </div>

    <div class="slider-buttons">

        <button class="slide-btn" onclick="prevSlide()">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button class="slide-btn" onclick="nextSlide()">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

    </div>

</section>

<footer>
    © 2026 I Wash V20 - IAS | Premium Carcare & Service Center
</footer>

<script>

let slideIndex = 0;

const slides = document.getElementById('slides');

const totalSlides = document.querySelectorAll('.slides img').length;

function updateSlide(){
    slides.style.transform =
    `translateX(-${slideIndex * 100}%)`;
}

function nextSlide(){
    slideIndex = (slideIndex + 1) % totalSlides;
    updateSlide();
}

function prevSlide(){
    slideIndex =
    (slideIndex - 1 + totalSlides) % totalSlides;

    updateSlide();
}

setInterval(() => {
    nextSlide();
}, 5000);

</script>

</body>
</html>
